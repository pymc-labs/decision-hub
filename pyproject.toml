[tool.uv.workspace]
members = ["client", "server", "shared"]

# ---------------------------------------------------------------------------
# Ruff – single config for the whole monorepo
# ---------------------------------------------------------------------------
[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes (unused imports, undefined names)
    "I",     # isort (import ordering)
    "UP",    # pyupgrade (modern Python syntax)
    "B",     # flake8-bugbear (common bugs)
    "SIM",   # flake8-simplify
    "RUF",   # ruff-specific rules
]
ignore = [
    "E501",  # line length handled by formatter
]

[tool.ruff.lint.per-file-ignores]
# B008: Depends/typer.Argument/File in argument defaults is idiomatic FastAPI/Typer
"server/src/decision_hub/api/*.py" = ["B008"]
"client/src/dhub/cli/*.py" = ["B008"]

[tool.ruff.lint.isort]
known-first-party = ["dhub", "dhub_core", "decision_hub"]

# ---------------------------------------------------------------------------
# mypy – gradual type checking (CI-only, not pre-commit)
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
check_untyped_defs = true
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false
disable_error_code = ["import-untyped"]
