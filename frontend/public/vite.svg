<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="16" fill="#0a0a12"/>
  <polygon points="50,15 85,80 15,80" fill="none" stroke="#00f0ff" stroke-width="3" filter="url(#glow)"/>
  <circle cx="50" cy="52" r="12" fill="none" stroke="#ff2d95" stroke-width="2.5" filter="url(#glow)"/>
  <line x1="50" y1="40" x2="50" y2="64" stroke="#b400ff" stroke-width="2" filter="url(#glow)"/>
  <line x1="38" y1="52" x2="62" y2="52" stroke="#b400ff" stroke-width="2" filter="url(#glow)"/>
</svg>
