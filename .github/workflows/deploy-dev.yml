name: Deploy Dev

on:
  push:
    branches: [main]

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Modal CLI
        run: uv tool install modal

      - name: Build frontend
        run: cd frontend && npm ci && VITE_API_URL="" VITE_ENV=dev npx vite build

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run --package decision-hub-server python scripts/run_migrations.py

      - name: Decrypt security prompts config
        run: >
          openssl enc -aes-256-cbc -pbkdf2 -d
          -in server/src/decision_hub/infra/security_prompts.yaml.enc
          -out server/src/decision_hub/infra/security_prompts.yaml
          -pass pass:"$SECURITY_PROMPTS_KEY"
        env:
          SECURITY_PROMPTS_KEY: ${{ secrets.SECURITY_PROMPTS_KEY }}

      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          DHUB_ENV: dev
          MIN_CLI_VERSION: ${{ vars.MIN_CLI_VERSION_DEV }}
        run: cd server && modal deploy modal_app.py
